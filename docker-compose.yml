version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: habit-tracker-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db
    networks:
      - habit-tracker-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: habit-tracker-api
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/habit-tracker?authSource=admin
      JWT_SECRET: your_super_secret_key_here
      PORT: 5000
      NODE_ENV: development
    depends_on:
      - mongodb
    networks:
      - habit-tracker-network
    volumes:
      - .:/app
      - /app/node_modules
      - /app/backend/node_modules

volumes:
  mongo_data:

networks:
  habit-tracker-network:
    driver: bridge
