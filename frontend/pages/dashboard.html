<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Habit Tracker</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <h1 class="logo">📊 Habit Tracker</h1>
      <div class="nav-links">
        <span id="userGreeting" class="user-greeting"></span>
        <button class="nav-link logout-btn" id="logoutBtn">Logout</button>
      </div>
    </nav>

    <main class="dashboard">
      <section class="dashboard-header">
        <h2>My Habits</h2>
        <button class="btn btn-primary" id="addHabitBtn">+ Add New Habit</button>
      </section>

      <!-- Add Habit Modal -->
      <div id="addHabitModal" class="modal">
        <div class="modal-content">
          <span class="close">&times;</span>
          <h3>Add New Habit</h3>
          <form id="addHabitForm">
            <div class="form-group">
              <label for="habitName">Habit Name</label>
              <input type="text" id="habitName" name="habitName" required />
            </div>

            <div class="form-group">
              <label for="habitDescription">Description (Optional)</label>
              <textarea id="habitDescription" name="habitDescription" rows="3"></textarea>
            </div>

            <div class="form-group">
              <label for="habitCategory">Category</label>
              <select id="habitCategory" name="habitCategory">
                <option value="health">Health</option>
                <option value="fitness">Fitness</option>
                <option value="learning">Learning</option>
                <option value="productivity">Productivity</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div class="form-group">
              <label for="habitFrequency">Frequency</label>
              <select id="habitFrequency" name="habitFrequency">
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
              </select>
            </div>

            <button type="submit" class="btn btn-primary">Create Habit</button>
          </form>
        </div>
      </div>

      <!-- Habits Grid -->
      <div class="habits-grid" id="habitsGrid">
        <p class="empty-message">No habits yet. Create one to get started!</p>
      </div>
    </main>

    <footer class="footer">
      <p>&copy; 2026 Habit Tracker. All rights reserved.</p>
    </footer>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
